<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Меню</title>
    <style>
        body {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 100%);
            min-height: 100vh;
            padding: 40px;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .menu {
            background: white;
            border-radius: 24px;
            padding: 15px 20px;
            width: 300px;
            margin: 0 auto;
            box-shadow: 0 8px 20px rgba(232, 122, 156, 0.15);
        }

        .menu ul {
            margin: 10px 0 0 0;
            list-style: none;
            padding-left: 25px;
            display: none;
        }

        .menu li {
            padding: 8px 0;
            color: #5a3a2a;
            border-bottom: 1px solid #ffe0e8;
        }

        .menu li:last-child {
            border-bottom: none;
        }

        .menu .title {
            font-size: 18px;
            cursor: pointer;
            font-weight: 600;
            color: #b14a6b;
            display: block;
            padding: 5px 0;
        }

        .menu .title::before {
            content: '▶';
            font-size: 80%;
            color: #e87a9c;
            display: inline-block;
            width: 22px;
            transition: transform 0.2s ease;
        }

        .menu.open .title::before {
            content: '▼';
        }

        .menu.open ul {
            display: block;
        }
    </style>
</head>
<body>
    <div class="menu open">
        <span class="title">Сладости (нажми меня)!</span>
        <ul>
            <li>Торт</li>
            <li>Пончик</li>
            <li>Пирожное</li>
        </ul>
    </div>

    <script>
        'use strict';

        const menu = document.querySelector('.menu');
        const title = menu.querySelector('.title');
        
        title.addEventListener('click', () => {
            menu.classList.toggle('open');
        });
    </script>
</body>
</html>
