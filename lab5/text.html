<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Text</title>
    <style>
        body {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        #text {
            font-size: 24px;
            font-weight: 500;
            color: #b14a6b;
            background: white;
            padding: 20px 40px;
            border-radius: 60px;
            margin-top: 30px;
            box-shadow: 0 8px 20px rgba(232, 122, 156, 0.15);
            text-align: center;
        }

        #hider {
            background: #e87a9c;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(232, 122, 156, 0.3);
        }

        #hider:hover {
            background: #b14a6b;
            transform: scale(1.02);
            box-shadow: 0 6px 16px rgba(232, 122, 156, 0.4);
        }

        #hider:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <input type="button" id="hider" value="Спрятать текст">
    <div id="text">Текст</div>

    <script>
        'use strict';

        const button = document.getElementById('hider');
        const text = document.getElementById('text');
        
        button.addEventListener('click', () => {
            if (text.style.display === 'none') {
                text.style.display = 'block';
                button.value = 'Спрятать текст';
            } else {
                text.style.display = 'none';
                button.value = 'Показать текст';
            }
        });
    </script>
</body>
</html>
