<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дерево из объекта</title>
    <style>
        body {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 100%);
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 40px;
            margin: 0;
        }

        #container {
            background: white;
            border-radius: 32px;
            padding: 25px 35px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 12px 28px rgba(232, 122, 156, 0.15);
        }

        ul {
            list-style: none;
            padding-left: 20px;
        }

        li {
            margin: 8px 0;
            color: #5a3a2a;
            font-size: 16px;
            cursor: pointer;
            position: relative;
            padding-left: 20px;
        }

        li::before {
            content: '🌸';
            position: absolute;
            left: -5px;
            top: 0;
            font-size: 14px;
        }

        li > ul {
            margin-top: 5px;
        }

        li > ul > li::before {
            content: '🍃';
        }

        li > ul > li > ul > li::before {
            content: '🌿';
        }

        li:hover {
            color: #e87a9c;
            transform: translateX(5px);
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <script>
        'use strict';

        let data = {
            "Рыбы": {
                "форель": {},
                "лосось": {}
            },
            "Деревья": {
                "Огромные": {
                    "секвойя": {},
                    "дуб": {}
                },
                "Цветковые": {
                    "яблоня": {},
                    "магнолия": {}
                }
            }
        };

        function createTree(container, data) {
            container.innerHTML = '';
            
            function createUl(obj) {
                const ul = document.createElement('ul');
                
                for (let key in obj) {
                    const li = document.createElement('li');
                    li.textContent = key;
                    
                    if (Object.keys(obj[key]).length > 0) {
                        li.appendChild(createUl(obj[key]));
                    }
                    
                    ul.appendChild(li);
                }
                
                return ul;
            }
            
            container.appendChild(createUl(data));
        }

        let container = document.getElementById('container');
        createTree(container, data);
    </script>
</body>
</html>
