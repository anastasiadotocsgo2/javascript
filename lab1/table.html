<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 5 | Генерация таблицы</title>
    <style>
        body {
            background: #1e1e2f;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #fffaf8;
            border-radius: 48px;
            padding: 35px 30px;
            max-width: 800px;
            width: 100%;
        }
        h2 { color: #6B3E26; text-align: center; }
        .flex { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
        input { padding: 12px; border-radius: 40px; border: 2px solid #FFCDBD; width: 180px; }
        button { background: #6B3E26; color: white; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-weight: bold; }
        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 28px;
            overflow-x: auto;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            white-space: pre;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>🐕 Генератор таблицы «собаки / кошки»</h2>
    <div class="flex">
        <input type="number" id="rowsCount" placeholder="Количество строк" min="1">
        <button id="drawBtn">Рисовать таблицу</button>
    </div>
    <pre id="consoleTable"></pre>
    <div style="text-align:center;"><a href="../index.html" style="color:#6B3E26;">← Назад</a></div>
</div>

<script>
    'use strict';

    function generateAnimalString(length) {
        const pattern = ['dog', 'dog', 'dog', 'cat', 'cat', 'dog'];
        let result = [];
        for (let i = 0; i < length; i++) {
            result.push(pattern[i % pattern.length]);
        }
        return result.join('\t');
    }

    document.getElementById('drawBtn').addEventListener('click', () => {
        const rowsInput = document.getElementById('rowsCount');
        let rows = parseInt(rowsInput.value, 10);
        const output = document.getElementById('consoleTable');

        if (isNaN(rows) || rows <= 0) {
            output.textContent = '❌ Введите корректное положительное число строк.';
            return;
        }

        let tableString = '';
        for (let i = 0; i < rows; i++) {
            tableString += generateAnimalString(6) + '\n';
        }
        output.textContent = tableString;
        console.log(tableString);
    });
</script>
</body>
</html>
