<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ввод числа</title>
</head>
<body>
    <a href="index.html" id="numberLink">Получить число</a>

    <script>
        'use strict';

        document.getElementById('numberLink').addEventListener('click', (e) => {
            let userInput;
            
            while (true) {
                userInput = prompt('Введите число больше 100:');
                
                if (userInput === null) {
                    const shouldProceed = confirm('Вы не ввели число. Хотите перейти по ссылке?');
                    if (!shouldProceed) {
                        e.preventDefault();
                    }
                    break;
                }
                
                const number = Number(userInput);
                
                if (!isNaN(number) && number > 100) {
                    return;
                }
                
                alert('Нужно ввести число больше 100!');
            }
            
            if (userInput === null) {
                return;
            }
            
            e.preventDefault();
        });
    </script>
</body>
</html>
