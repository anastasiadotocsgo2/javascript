<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Show Prompt</title>
    <style>
        body {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .test-button {
            background: #e87a9c;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 16px rgba(232, 122, 156, 0.3);
        }

        .test-button:hover {
            background: #b14a6b;
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(232, 122, 156, 0.4);
        }

        .test-button:active {
            transform: scale(0.98);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(232, 122, 156, 0.3);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 28px;
            border-radius: 32px;
            min-width: 350px;
            box-shadow: 0 20px 40px rgba(232, 122, 156, 0.25);
            text-align: center;
        }

        .modal div {
            color: #b14a6b;
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .modal input {
            width: 100%;
            padding: 12px 16px;
            margin: 15px 0;
            box-sizing: border-box;
            border: 2px solid #ffe0e8;
            border-radius: 60px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            color: #5a3a2a;
        }

        .modal input:focus {
            border-color: #e87a9c;
            box-shadow: 0 0 0 3px rgba(232, 122, 156, 0.2);
        }

        .modal button {
            padding: 8px 24px;
            margin: 0 8px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .modal button:first-of-type {
            background: #e87a9c;
            color: white;
        }

        .modal button:first-of-type:hover {
            background: #b14a6b;
            transform: scale(1.02);
        }

        .modal button:last-of-type {
            background: #ffe0e8;
            color: #b14a6b;
        }

        .modal button:last-of-type:hover {
            background: #ffd0dc;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <button class="test-button" onclick="testPrompt()">Показать диалог</button>

    <script>
        'use strict';

        function showPrompt(html, callback) {
            const focusedElement = document.activeElement;
            
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            
            const content = document.createElement('div');
            content.innerHTML = html;
            
            const input = document.createElement('input');
            input.type = 'text';
            input.id = 'prompt-input';
            
            const okBtn = document.createElement('button');
            okBtn.textContent = 'OK';
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'ОТМЕНА';
            
            modal.appendChild(content);
            modal.appendChild(input);
            modal.appendChild(okBtn);
            modal.appendChild(cancelBtn);
            overlay.appendChild(modal);
            document.body.appendChild(overlay);
            
            document.body.style.overflow = 'hidden';
            
            function close(result) {
                overlay.remove();
                document.body.style.overflow = '';
                if (focusedElement && focusedElement.focus) {
                    focusedElement.focus();
                }
                callback(result);
            }
            
            okBtn.onclick = () => close(input.value);
            cancelBtn.onclick = () => close(null);
            
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    close(input.value);
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    close(null);
                }
            });
            
            setTimeout(() => input.focus(), 0);
            
            overlay.addEventListener('keydown', function(e) {
                if (e.key === 'Tab') {
                    const focusable = [input, okBtn, cancelBtn];
                    const firstFocusable = focusable[0];
                    const lastFocusable = focusable[focusable.length - 1];
                    
                    if (e.shiftKey) {
                        if (document.activeElement === firstFocusable) {
                            e.preventDefault();
                            lastFocusable.focus();
                        }
                    } else {
                        if (document.activeElement === lastFocusable) {
                            e.preventDefault();
                            firstFocusable.focus();
                        }
                    }
                }
            });
        }
        
        function testPrompt() {
            showPrompt("Введите что-нибудь<br>... умное:", function(value) {
                alert(value);
            });
        }
    </script>
</body>
</html>
