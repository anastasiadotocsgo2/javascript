<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактируемая таблица</title>
    <style>
        body {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        table {
            border-collapse: collapse;
            margin: 20px;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(232, 122, 156, 0.15);
        }

        td {
            border: 1px solid #ffe0e8;
            padding: 15px;
            min-width: 120px;
            cursor: pointer;
            text-align: center;
            color: #5a3a2a;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        td:hover {
            background: #fff0f5;
            color: #e87a9c;
        }

        .editing {
            background-color: #ffe0e8;
            padding: 10px;
        }

        textarea {
            width: 100%;
            margin: 0;
            padding: 10px;
            resize: none;
            box-sizing: border-box;
            border: 2px solid #e87a9c;
            border-radius: 16px;
            font-family: inherit;
            font-size: 14px;
            color: #5a3a2a;
            background: white;
            outline: none;
        }

        textarea:focus {
            border-color: #b14a6b;
            box-shadow: 0 0 0 3px rgba(232, 122, 156, 0.2);
        }

        .edit-controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .edit-controls button {
            padding: 6px 18px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .edit-controls button:first-child {
            background: #e87a9c;
            color: white;
        }

        .edit-controls button:first-child:hover {
            background: #b14a6b;
            transform: scale(1.02);
        }

        .edit-controls button:last-child {
            background: #ffe0e8;
            color: #b14a6b;
        }

        .edit-controls button:last-child:hover {
            background: #ffd0dc;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <table id="editableTable">
        <tr>
            <td>Ячейка 1</td>
            <td>Ячейка 2</td>
            <td>Ячейка 3</td>
        </tr>
        <tr>
            <td>Ячейка 4</td>
            <td>Ячейка 5</td>
            <td>Ячейка 6</td>
        </tr>
    瞄准

    <script>
        'use strict';
        
        const table = document.getElementById('editableTable');
        let editingCell = null;
        
        function startEdit(cell) {
            if (editingCell) return;
            
            editingCell = cell;
            const originalHTML = cell.innerHTML;
            
            const textarea = document.createElement('textarea');
            textarea.value = originalHTML;
            textarea.style.width = '100%';
            textarea.style.height = '60px';
            textarea.style.resize = 'none';
            
            const okBtn = document.createElement('button');
            okBtn.textContent = 'OK';
            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'ОТМЕНА';
            
            const controls = document.createElement('div');
            controls.className = 'edit-controls';
            controls.appendChild(okBtn);
            controls.appendChild(cancelBtn);
            
            cell.innerHTML = '';
            cell.appendChild(textarea);
            cell.appendChild(controls);
            cell.classList.add('editing');
            
            textarea.focus();
            
            okBtn.onclick = function() {
                cell.innerHTML = textarea.value;
                cell.classList.remove('editing');
                editingCell = null;
            };
            
            cancelBtn.onclick = function() {
                cell.innerHTML = originalHTML;
                cell.classList.remove('editing');
                editingCell = null;
            };
        }
        
        table.addEventListener('click', function(e) {
            const cell = e.target.closest('td');
            if (!cell) return;
            if (editingCell === cell) return;
            if (editingCell !== null) return;
            
            startEdit(cell);
        });
    </script>
</body>
</html>
