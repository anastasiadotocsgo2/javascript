<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Плейсхолдер</title>
    <style>
        body {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .input-container {
            position: relative;
            margin: 50px;
        }

        input {
            width: 280px;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid #e87a9c;
            border-radius: 60px;
            background: white;
            outline: none;
            transition: all 0.3s ease;
            color: #5a3a2a;
        }

        input:focus {
            border-color: #b14a6b;
            box-shadow: 0 0 0 3px rgba(232, 122, 156, 0.2);
        }

        .placeholder {
            color: #e87a9c;
            font-style: italic;
        }

        .hint {
            position: absolute;
            top: -28px;
            left: 15px;
            font-size: 12px;
            color: #b14a6b;
            background: white;
            padding: 4px 12px;
            border-radius: 40px;
            display: none;
            box-shadow: 0 2px 8px rgba(232, 122, 156, 0.15);
        }
    </style>
</head>
<body>
    <div class="input-container">
        <input type="text" id="myInput" data-placeholder="Введите текст...">
        <div class="hint" id="hint"></div>
    </div>

    <script>
        'use strict';

        const input = document.getElementById('myInput');
        const hint = document.getElementById('hint');
        const placeholderText = input.getAttribute('data-placeholder');
        
        input.value = placeholderText;
        input.classList.add('placeholder');
        
        input.addEventListener('focus', function() {
            hint.textContent = placeholderText;
            hint.style.display = 'block';
            
            if (this.value === placeholderText) {
                this.value = '';
                this.classList.remove('placeholder');
            }
        });
        
        input.addEventListener('blur', function() {
            hint.style.display = 'none';
            
            if (this.value === '') {
                this.value = placeholderText;
                this.classList.add('placeholder');
            }
        });
    </script>
</body>
</html>
